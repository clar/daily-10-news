name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Generate dates.json
        run: |
          python3 -c "
          import os, json, re, subprocess

          # Standard date-directory based sections
          sections_map = {
              'github': 'github_daily',
              'ai': 'ai_daily',
              'crypto': 'crypto_daily',
          }

          all_dates = set()
          date_sections = {}
          latest_commit = {}  # section_key -> latest git commit timestamp

          def get_last_commit_time(path):
              try:
                  result = subprocess.run(
                      ['git', 'log', '-1', '--format=%aI', '--', path],
                      capture_output=True, text=True, timeout=10
                  )
                  return result.stdout.strip() or None
              except:
                  return None

          for key, dir_name in sections_map.items():
              if not os.path.isdir(dir_name):
                  continue
              for d in os.listdir(dir_name):
                  if not os.path.isdir(os.path.join(dir_name, d)):
                      continue
                  all_dates.add(d)
                  date_sections.setdefault(d, []).append(key)
              t = get_last_commit_time(dir_name)
              if t:
                  latest_commit[key] = t

          # Iran: flat date-named markdown files in iran_daily/
          iran_dir = 'iran_daily'
          iran_files = {}  # date -> [filenames]
          if os.path.isdir(iran_dir):
              for f in os.listdir(iran_dir):
                  if not f.endswith('.md'):
                      continue
                  m = re.match(r'(\d{4}-\d{2}-\d{2})', f)
                  if m:
                      d = m.group(1)
                      all_dates.add(d)
                      date_sections.setdefault(d, []).append('iran')
                      iran_files.setdefault(d, []).append(f)
              t = get_last_commit_time(iran_dir)
              if t:
                  latest_commit['iran'] = t

          # Deduplicate section lists
          for d in date_sections:
              date_sections[d] = sorted(set(date_sections[d]))

          # Sort iran files per date (latest timestamp first)
          for d in iran_files:
              iran_files[d] = sorted(iran_files[d], reverse=True)

          dates_sorted = sorted(all_dates, reverse=True)

          data = {
              'dates': dates_sorted,
              'sections': {d: date_sections.get(d, []) for d in dates_sorted},
              'iran_files': {d: iran_files[d] for d in dates_sorted if d in iran_files},
              'latest_commit': latest_commit,
          }

          with open('dates.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f'Generated dates.json with {len(dates_sorted)} dates')
          "

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
