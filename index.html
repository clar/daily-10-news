<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAILY 10 NEWS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231a1a1a'/%3E%3Ctext x='50' y='74' font-family='Georgia,serif' font-size='62' font-weight='700' fill='%23faf8f5' text-anchor='middle'%3E10%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Han+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --ink: #1a1a1a;
  --ink-secondary: #4a4a4a;
  --ink-muted: #8a8a8a;
  --paper: #faf8f5;
  --paper-card: #ffffff;
  --accent-github: #c9463d;
  --accent-ai: #2d6a9f;
  --accent-crypto: #b8860b;
  --accent-stock: #b85c38;
  --accent-polymarket: #7b61ff;
  --accent-hackernews: #ff6600;
  --rule: #d4cfc8;
  --rule-light: #e8e4de;
  --font-display: 'Playfair Display', 'Georgia', serif;
  --font-body: 'Source Han Sans SC', 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Menlo', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}

/* ─── 顶栏 ─── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px clamp(20px, 4vw, 48px);
  min-height: 52px;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 1px;
  text-decoration: none;
  white-space: nowrap;
}

.brand:hover .masthead { opacity: 0.7; }

.masthead {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 20px;
  letter-spacing: -0.3px;
  color: var(--ink);
  line-height: 1.1;
}

.tagline {
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  text-transform: uppercase;
}

.date-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.date-controls button {
  background: none;
  border: 1px solid var(--rule);
  width: 32px;
  height: 32px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.date-controls button:hover { border-color: var(--ink); color: var(--ink); }
.date-controls button:disabled { opacity: 0.25; cursor: not-allowed; }

.date-label {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-secondary);
  padding: 0 8px;
  min-width: 100px;
  text-align: center;
}

.date-controls input[type="date"] {
  font-family: var(--font-mono);
  font-size: 13px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 4px 8px;
  background: transparent;
  color: var(--ink-secondary);
  cursor: pointer;
  height: 32px;
}

/* ─── Tab 导航 ─── */
.section-tabs {
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
  display: flex;
  justify-content: center;
  gap: 0;
  position: sticky;
  top: 52px;
  z-index: 99;
}

.section-tabs a {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
}

.section-tabs a:hover { color: var(--ink); }

.section-tabs a.active[data-section="github"] { color: var(--accent-github); border-bottom-color: var(--accent-github); }
.section-tabs a.active[data-section="ai"] { color: var(--accent-ai); border-bottom-color: var(--accent-ai); }
.section-tabs a.active[data-section="crypto"] { color: var(--accent-crypto); border-bottom-color: var(--accent-crypto); }
.section-tabs a.active[data-section="stock"] { color: var(--accent-stock); border-bottom-color: var(--accent-stock); }
.section-tabs a.active[data-section="polymarket"] { color: var(--accent-polymarket); border-bottom-color: var(--accent-polymarket); }
.section-tabs a.active[data-section="hackernews"] { color: var(--accent-hackernews); border-bottom-color: var(--accent-hackernews); }

.tab-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
[data-section="github"] .tab-dot { background: var(--accent-github); }
[data-section="ai"] .tab-dot { background: var(--accent-ai); }
[data-section="crypto"] .tab-dot { background: var(--accent-crypto); }
[data-section="stock"] .tab-dot { background: var(--accent-stock); }
[data-section="polymarket"] .tab-dot { background: var(--accent-polymarket); }
[data-section="hackernews"] .tab-dot { background: var(--accent-hackernews); }

/* 无数据的 tab 样式 */
.section-tabs a.unavailable {
  opacity: 0.35;
  cursor: default;
}

/* ─── 主内容 ─── */
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 clamp(20px, 4vw, 48px) 80px;
}

.section {
  display: none;
  padding-top: 36px;
  animation: fadeIn 0.25s ease-out both;
}

.section.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.section-body {
  background: var(--paper-card);
  border: 1px solid var(--rule-light);
  border-radius: 4px;
  padding: clamp(24px, 4vw, 48px) clamp(28px, 5vw, 56px);
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}

.section-body .empty {
  color: var(--ink-muted);
  text-align: center;
  padding: 60px 0;
  font-size: 15px;
}

.loading {
  text-align: center;
  padding: 60px 0;
  color: var(--ink-muted);
  font-size: 14px;
}

.loading::after {
  content: '';
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--rule);
  border-top-color: var(--ink-muted);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Markdown 渲染 ─── */
.section-body > h1:first-child { display: none; }
.section-body > :first-child,
.section-body > h1:first-child + * { margin-top: 0; }

.section-body h1 {
  font-family: var(--font-display);
  font-size: 1.5em;
  font-weight: 700;
  margin: 0 0 0.6em;
  padding-bottom: 0.4em;
  border-bottom: 1px solid var(--rule);
  letter-spacing: -0.3px;
  line-height: 1.3;
}

.section-body h2 {
  font-size: 1.15em;
  font-weight: 700;
  margin: 2em 0 0.6em;
  padding-bottom: 0.3em;
  border-bottom: 1px solid var(--rule-light);
  color: var(--ink);
}

.section-body h3 {
  font-size: 1em;
  font-weight: 700;
  margin: 1.4em 0 0.4em;
  color: var(--ink);
}

.section-body p {
  margin: 0.75em 0;
  color: var(--ink-secondary);
  line-height: 1.85;
}

.section-body a {
  color: #1a6dab;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}

.section-body a:hover { border-bottom-color: #1a6dab; }

.section-body ul, .section-body ol { padding-left: 1.5em; margin: 0.6em 0; }
.section-body li { margin: 0.45em 0; color: var(--ink-secondary); line-height: 1.8; }
.section-body li strong { color: var(--ink); }

.section-body blockquote {
  border-left: 3px solid var(--rule);
  padding: 10px 20px;
  margin: 1.2em 0;
  color: var(--ink-secondary);
  background: rgba(0,0,0,0.02);
  border-radius: 0 4px 4px 0;
  font-size: 0.95em;
}

.section-body hr {
  border: none;
  border-top: 1px solid var(--rule-light);
  margin: 2em 0;
}

.section-body code {
  font-family: var(--font-mono);
  background: #f0ede8;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.88em;
}

.section-body pre {
  background: #2b2b2b;
  color: #e0ddd8;
  padding: 16px 20px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 1em 0;
  font-size: 0.88em;
}

.section-body pre code {
  background: none;
  padding: 0;
  color: inherit;
}

.section-body strong { font-weight: 700; color: var(--ink); }

/* ─── 表格 ─── */
.section-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.2em 0;
  font-size: 0.9em;
  line-height: 1.6;
}

.section-body th {
  text-align: left;
  font-weight: 700;
  font-size: 0.9em;
  color: var(--ink);
  padding: 10px 14px;
  border-bottom: 2px solid var(--ink);
  background: transparent;
}

.section-body td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule-light);
  color: var(--ink-secondary);
  vertical-align: top;
}

.section-body tr:hover td { background: rgba(0,0,0,0.02); }
.section-body td a { font-weight: 500; }


/* ─── 页脚 ─── */
.footer-rule {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 48px);
}

.footer-rule hr {
  border: none;
  border-top: 1px solid var(--rule);
  margin-bottom: 20px;
}

.footer-info {
  max-width: 1000px;
  margin: 0 auto 40px;
  padding: 0 clamp(16px, 3vw, 48px);
  font-size: 12px;
  color: var(--ink-muted);
  font-family: var(--font-mono);
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  align-items: center;
}

.footer-info .sep { opacity: 0.5; }

.footer-info a {
  color: var(--ink-muted);
  text-decoration: none;
  border-bottom: 1px dotted var(--rule);
  transition: color 0.15s, border-color 0.15s;
}

.footer-info a:hover {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

/* ─── 响应式 ─── */
@media (max-width: 768px) {
  .masthead { font-size: 16px; }
  .tagline { font-size: 8.5px; letter-spacing: 0.1em; }
  .section-tabs a { padding: 12px 16px; font-size: 12px; }
  .section-body { padding: 16px; }
  .section-label span { font-size: 20px; }
  .section-body table { font-size: 0.82em; }
  .section-body th, .section-body td { padding: 8px 10px; }
  .section { padding-top: 24px; }
  .date-label { display: none; }
}

@media (max-width: 480px) {
  .section-tabs a { padding: 10px 10px; font-size: 11px; gap: 5px; }
  .tab-dot { width: 6px; height: 6px; }
}
</style>
</head>
<body>

<header class="topbar">
  <a class="brand" href="#" id="masthead-link">
    <span class="masthead">10 NEWS</span>
    <span class="tagline">Updated Daily · 05:00 UTC+8</span>
  </a>
  <div class="date-controls">
    <button id="prev-btn" title="前一天">&#8592;</button>
    <span class="date-label" id="date-display"></span>
    <button id="next-btn" title="后一天">&#8594;</button>
    <input type="date" id="date-picker" title="选择日期">
  </div>
</header>

<nav class="section-tabs" id="section-tabs">
  <a data-section="github"><span class="tab-dot"></span>GitHub</a>
  <a data-section="ai"><span class="tab-dot"></span>AI</a>
  <a data-section="crypto"><span class="tab-dot"></span>Crypto</a>
  <a data-section="stock"><span class="tab-dot"></span>Stock</a>
  <a data-section="polymarket"><span class="tab-dot"></span>Polymarket</a>
  <a data-section="hackernews"><span class="tab-dot"></span>Hacker News</a>
</nav>

<main class="container">
  <div class="section" id="section-github">
    <div class="section-body" id="content-github"><div class="loading">Loading</div></div>
  </div>
  <div class="section" id="section-ai">
    <div class="section-body" id="content-ai"><div class="loading">Loading</div></div>
  </div>
  <div class="section" id="section-crypto">
    <div class="section-body" id="content-crypto"><div class="loading">Loading</div></div>
  </div>
  <div class="section" id="section-stock">
    <div class="section-body" id="content-stock"><div class="loading">Loading</div></div>
  </div>
  <div class="section" id="section-polymarket">
    <div class="section-body" id="content-polymarket"><div class="loading">Loading</div></div>
  </div>
  <div class="section" id="section-hackernews">
    <div class="section-body" id="content-hackernews"><div class="loading">Loading</div></div>
  </div>
</main>

<div class="footer-rule"><hr></div>
<div class="footer-info">
  <span>10news.xyz — auto-generated daily briefing</span>
  <span class="sep">·</span>
  <a href="https://github.com/clar/claude-routine/issues" target="_blank" rel="noopener">Feedback</a>
</div>

<script>
(function() {
  let datesData = null;
  let currentDate = null;
  let activeSection = null;

  const SECTIONS = [
    { key: 'github', path: d => `github_daily/${d}/trending.md` },
    { key: 'ai',     path: d => `ai_daily/${d}/report.md` },
    { key: 'crypto', path: d => `crypto_daily/${d}/report.md` },
    { key: 'stock',  path: d => `stock_daily/${d}/report.md` },
    { key: 'polymarket', path: d => `polymarket_daily/${d}/report.md` },
    { key: 'hackernews', path: d => `hackernews_daily/${d}/report.md` },
  ];

  const dateDisplay = document.getElementById('date-display');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const datePicker = document.getElementById('date-picker');
  const tabLinks = document.querySelectorAll('.section-tabs a');

  async function init() {
    try {
      const resp = await fetch('dates.json?t=' + Date.now());
      datesData = await resp.json();
    } catch {
      dateDisplay.textContent = 'Error';
      return;
    }

    if (!datesData.dates || datesData.dates.length === 0) {
      dateDisplay.textContent = 'No data';
      return;
    }

    const hashDate = getHashDate();
    const hashSection = getHashSection();
    const targetDate = hashDate && datesData.dates.includes(hashDate) ? hashDate : datesData.dates[0];

    datePicker.min = datesData.dates[datesData.dates.length - 1];
    datePicker.max = datesData.dates[0];

    // Tab click handlers
    tabLinks.forEach(link => {
      link.addEventListener('click', () => {
        if (link.classList.contains('unavailable')) return;
        switchSection(link.dataset.section);
      });
    });

    document.getElementById('masthead-link').addEventListener('click', e => {
      e.preventDefault();
      loadDate(datesData.dates[0]);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    prevBtn.addEventListener('click', () => navigateDate(-1));
    nextBtn.addEventListener('click', () => navigateDate(1));
    datePicker.addEventListener('change', () => {
      const val = datePicker.value;
      if (val && datesData.dates.includes(val)) {
        loadDate(val);
      } else if (val) {
        const closest = datesData.dates.reduce((prev, d) =>
          Math.abs(new Date(d) - new Date(val)) < Math.abs(new Date(prev) - new Date(val)) ? d : prev
        );
        loadDate(closest);
      }
    });

    window.addEventListener('hashchange', () => {
      const d = getHashDate();
      const s = getHashSection();
      if (d && d !== currentDate && datesData.dates.includes(d)) loadDate(d, s);
      else if (s && s !== activeSection) switchSection(s);
    });

    loadDate(targetDate, hashSection);
  }

  function getHashDate() {
    const match = location.hash.match(/date=(\d{4}-\d{2}-\d{2})/);
    return match ? match[1] : null;
  }

  function getHashSection() {
    const match = location.hash.match(/section=(\w+)/);
    return match ? match[1] : null;
  }

  function updateHash() {
    location.hash = `date=${currentDate}&section=${activeSection}`;
  }

  function loadDate(date, preferredSection) {
    currentDate = date;
    dateDisplay.textContent = date;
    datePicker.value = date;

    const idx = datesData.dates.indexOf(date);
    prevBtn.disabled = idx >= datesData.dates.length - 1;
    nextBtn.disabled = idx <= 0;

    const available = datesData.sections[date] || [];

    // Update tab availability
    tabLinks.forEach(link => {
      const key = link.dataset.section;
      if (available.includes(key)) {
        link.classList.remove('unavailable');
      } else {
        link.classList.add('unavailable');
      }
    });

    // Load all section content
    SECTIONS.forEach(s => {
      const el = document.getElementById(`content-${s.key}`);
      if (available.includes(s.key)) {
        el.innerHTML = '<div class="loading">Loading</div>';
        fetchMarkdown(s.path(date), el);
      } else {
        el.innerHTML = '<div class="empty">No report available for this date</div>';
      }
    });

    // Determine which tab to show
    const target = preferredSection && available.includes(preferredSection)
      ? preferredSection
      : findMostRecentSection(date, available);
    switchSection(target || available[0] || 'github');
  }

  function findMostRecentSection(date, available) {
    const commits = datesData.latest_commit || {};
    // Sort available sections by their latest commit time, descending
    const sorted = available.slice().sort((a, b) => {
      const ta = commits[a] || '';
      const tb = commits[b] || '';
      return tb.localeCompare(ta);
    });
    return sorted[0] || available[0];
  }

  function switchSection(key) {
    activeSection = key;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(`section-${key}`);
    if (target) {
      target.classList.add('active');
      // Re-trigger animation
      target.style.animation = 'none';
      target.offsetHeight; // force reflow
      target.style.animation = '';
    }
    tabLinks.forEach(link => {
      link.classList.toggle('active', link.dataset.section === key);
    });
    updateHash();
  }

  async function fetchMarkdown(path, el) {
    try {
      const resp = await fetch(path + '?t=' + Date.now());
      if (!resp.ok) throw new Error(resp.status);
      const md = await resp.text();
      el.innerHTML = marked.parse(md);
      // Auto-nowrap short-content columns
      el.querySelectorAll('table').forEach(table => {
        const rows = table.querySelectorAll('tbody tr');
        if (rows.length === 0) return;
        const colCount = rows[0].children.length;
        for (let c = 0; c < colCount; c++) {
          const maxLen = Array.from(rows).reduce((max, row) => {
            const cell = row.children[c];
            return cell ? Math.max(max, cell.textContent.trim().length) : max;
          }, 0);
          if (maxLen <= 6) {
            Array.from(rows).forEach(row => {
              if (row.children[c]) row.children[c].style.whiteSpace = 'nowrap';
            });
            const th = table.querySelector(`thead th:nth-child(${c + 1})`);
            if (th) th.style.whiteSpace = 'nowrap';
          }
        }
      });
    } catch {
      el.innerHTML = '<div class="empty">No report available for this date</div>';
    }
  }

  function navigateDate(direction) {
    const idx = datesData.dates.indexOf(currentDate);
    const newIdx = idx - direction;
    if (newIdx >= 0 && newIdx < datesData.dates.length) {
      loadDate(datesData.dates[newIdx]);
    }
  }

  init();
})();
</script>
</body>
</html>
